<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080d17">
  <!-- PWA Manifest & iOS Support -->
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CBRSM Challenger">
  <meta name="mobile-web-app-capable" content="yes">
  <title>CBRSM Challenger - Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      background: #080d17; 
      margin: 0; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      position: relative; 
      overflow: hidden;
    }
    
    /* Subtle elegant lighting effect */
    body::before { 
      content: ''; 
      position: absolute; 
      width: 80vw; 
      height: 80vh; 
      background: radial-gradient(circle, rgba(255, 255, 255, 0.02) 0%, rgba(8, 13, 23, 0) 60%); 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%); 
      z-index: 0; 
      pointer-events: none; 
    }
    
    .login-wrapper { 
      position: relative; 
      z-index: 1; 
      width: 100%; 
      display: flex; 
      justify-content: center; 
      padding: 1.5rem; 
      box-sizing: border-box; 
    }
    
    .login-box { 
      text-align: center; 
      padding: 3rem 2.5rem; 
      max-width: 420px; 
      width: 100%; 
      border-radius: 16px; 
      background: #111827; 
      border: 1px solid rgba(255, 255, 255, 0.06); 
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.02) inset; 
      box-sizing: border-box;
    }
    
    .logo-container {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
    }
    
    .logo-icon {
      width: 56px;
      height: 56px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f59e0b;
      font-weight: 700;
      font-size: 1.25rem;
      font-family: 'Outfit', sans-serif;
    }

    h2 { 
      color: #f0f4ff; 
      margin-top: 0; 
      margin-bottom: 0.5rem; 
      font-family: 'Outfit', sans-serif; 
      font-size: 1.75rem; 
      font-weight: 600; 
      letter-spacing: -0.5px; 
    }
    
    p { 
      color: #94a3b8; 
      line-height: 1.6; 
      font-size: 0.95rem; 
      margin-bottom: 2.5rem; 
    }
    
    .google-btn { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 0.75rem; 
      background: #f59e0b; 
      color: #080d17; 
      padding: 0.875rem 1.5rem; 
      border-radius: 12px; 
      font-weight: 600; 
      text-decoration: none; 
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2); 
      transition: all 0.2s ease; 
      width: 100%; 
      box-sizing: border-box; 
      font-size: 1rem; 
    }
    
    .google-btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 8px 16px rgba(245, 158, 11, 0.3); 
      background: #fbbf24; 
    }
    
    .google-icon-wrapper {
      background: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .google-icon-wrapper svg { 
      width: 16px; 
      height: 16px; 
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <div class="logo-container">
        <div class="logo-icon">CBRSM</div>
      </div>
      <h2>Welcome Back</h2>
      <p>Sign in to securely back up your reading progress and access your cards anywhere.</p>
      <a href="{{ url_for('auth.login') }}" class="google-btn">
        <div class="google-icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
        </div>
        Sign In with Google
      </a>
    </div>
  </div>
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
