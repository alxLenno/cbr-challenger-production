<div class="analytics-container">

  <!-- Sub-Navigation Header -->
  <div class="analytics-subnav glass-panel">
    <button class="analytics-subnav-btn subnav-btn active" data-subtab="tab-chart">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
      Early-Riser Chart
    </button>
    <button class="analytics-subnav-btn subnav-btn" data-subtab="tab-scoring">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
      Point Analysis
    </button>
  </div>

  <div class="analytics-body">
    
    <!-- ════════ CHART TAB ════════ -->
    <div class="subtab-content active" id="tab-chart">
      <section class="glass-panel analytics-charts-section" id="charts-section">
        <div class="analytics-section-title">
          <div class="title-text">
            <h2>Early-Riser Chart</h2>
            <p>Track your waking time consistency against your target.</p>
          </div>
          <div class="chart-week-selector">
            <span class="week-selector-label">View Week:</span>
            <!-- Hidden native select preserved for app.js compatibility -->
            <select id="week-select-chart" style="display:none;" aria-hidden="true">
              <!-- Dynamically populated -->
            </select>
            <!-- Custom dropdown UI -->
            <div class="custom-week-dropdown" id="custom-week-dropdown" role="listbox" aria-label="Select Week">
              <button class="cwd-trigger" id="cwd-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="cwd-label">Week 1</span>
                <svg class="cwd-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <ul class="cwd-list" id="cwd-list" role="listbox">
                <!-- Dynamically populated by app.js -->
              </ul>
            </div>
          </div>
        </div>
        
        <div class="chart-wrapper" id="chart-container">
          <!-- Chart SVG rendered dynamically by app.js -->
        </div>
        
        <div class="analytics-chart-legend">
          <div class="analytics-legend-item">
            <span class="legend-swatch" style="background:var(--primary);"></span>
            <span>Waking Time curve</span>
          </div>
          <div class="analytics-legend-item">
            <span class="legend-swatch legend-target"></span>
            <span>Target Waking Limit</span>
          </div>
        </div>
      </section>
    </div>

    <!-- ════════ SCORING TAB ════════ -->
    <div class="subtab-content" id="tab-scoring">
      <section class="glass-panel analytics-scoring-section" id="scoring-section">
        <div class="analytics-section-title">
          <div class="title-text">
            <h2>Weekly Growth Point Analysis</h2>
            <p>Detailed breakdown of points earned and laxity points lost.</p>
          </div>
        </div>
        
        <div class="analytics-table-wrapper">
          <table class="analytics-score-table">
            <thead>
              <tr id="score-table-header-row">
                <!-- Dynamically populated based on timeline length by app.js -->
              </tr>
            </thead>
            <tbody id="scoring-table-body">
              <!-- Scores computed dynamically by app.js -->
            </tbody>
          </table>
        </div>
      </section>
    </div>

  </div>
</div>
