<div class="content-header">
  <div class="title-text">
    <h2>LEADERBOARD <span class="leaderboard-subtitle">| Global Rankings</span></h2>
    <p>Compare your progress against other challengers. Keep pushing forward!</p>
  </div>
</div>

<div class="leaderboard-wrapper">

  <!-- Segmented Control for Time Filters -->
  <div class="lb-filter-container">
    <div class="lb-segmented-control" id="lb-time-filters">
      <button class="lb-filter-btn active" data-filter="cumulative">
        <i data-lucide="globe"></i> All-Time
      </button>
      <button class="lb-filter-btn" data-filter="session">
        <i data-lucide="calendar"></i> This Session
      </button>
      <button class="lb-filter-btn" data-filter="weekly">
        <i data-lucide="bar-chart-2"></i> This Week
      </button>
      <button class="lb-filter-btn" data-filter="daily">
        <i data-lucide="sun"></i> Today
      </button>
    </div>
  </div>
  
  <!-- Loading State -->
  <div id="leaderboard-loader" class="leaderboard-loader">
    <div class="spinner"></div>
    <p>Fetching rankings...</p>
  </div>
  
  <!-- Podium Top 3 -->
  <div id="leaderboard-podium" class="podium-container" style="display: none;">
    <!-- Rendered by JS -->
  </div>
  
  <!-- Table Ranking -->
  <div id="leaderboard-list-wrapper" class="leaderboard-list-wrapper" style="display: none;">
    <table class="leaderboard-table">
      <thead>
        <tr>
          <th class="col-rank">RANK</th>
          <th class="col-user">USER</th>
          <th class="col-card text-center">CARD</th>
          <th class="col-points text-right">POINTS</th>
          <th class="col-laxity text-center">LAXITY</th>
        </tr>
      </thead>
      <tbody id="leaderboard-tbody">
        <!-- Rendered by JS -->
      </tbody>
    </table>
  </div>
  
</div>
